version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: scope
    labels: ["dependencies", "ci"]
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: scope
    labels: ["dependencies", "npm"]
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
